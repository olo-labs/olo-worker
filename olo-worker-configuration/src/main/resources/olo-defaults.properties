# olo-configuration: default values when ENV is not set.
# Env overrides: use OLO_ prefix + key in UPPER_SNAKE (e.g. OLO_DB_HOST overrides olo.db.host).

# Temporal
olo.temporal.target=localhost:47233
olo.temporal.namespace=default

# DB (olo_worker_configuration table); optional. If set, Temporal etc. loaded from DB and cached in Redis.
# olo.db.type=postgres|mysql|cockroach|citus (default postgres; Cockroach/Citus use PostgreSQL driver).
olo.db.type=postgres
olo.db.host=localhost
olo.db.port=45432
olo.db.name=olo_worker
olo.db.url=
olo.db.username=olo_worker
olo.db.password=pgpass
olo.db.pool.size=10
# When true, apply bundled SQL scripts (olo-worker-db src/main/resources/db/schema) on startup (idempotent). Env: OLO_DB_SCHEMA_AUTOAPPLY=false
olo.db.schema.autoapply=true

# Redis (for <root>:worker:config). Use olo.redis.uri for full URI, or olo.redis.host/olo.redis.port.
olo.redis.host=localhost
olo.redis.port=46379
olo.redis.password=
# olo.redis.uri=redis://localhost:6379

# Region list: comma-separated list of regions this instance serves.
# Preferred key: olo.regions (supports multi-region: e.g. "default,us-east").
# Legacy key (still supported): olo.region.
olo.regions=default,us-east

# Root key for all Redis config keys (prefix). Env override: OLO_CACHE_ROOT_KEY
olo.cache.root-key=olo

# Config refresh: dedicated config-refresh-thread; interval + jitter to avoid thundering herd.
olo.config.refresh.enabled=false
olo.config.refresh.interval.seconds=60
olo.config.refresh.interval.jitter.seconds=10
# Event-driven refresh: Redis Pub/Sub event triggers immediate refresh, polling remains fallback.
olo.config.refresh.pubsub.enabled=true
# Channel format: <root>:config:<section>:<region> (e.g. olo:config:core:us-east).
olo.config.refresh.pubsub.channel.prefix=
# Debounce (ms): delay Pub/Sub-triggered refresh so multiple admin updates coalesce into one. 0 = no delay.
olo.config.refresh.pubsub.debounce.ms=1500
# Snapshot size: max bytes per Redis value (core, pipelines, connections, meta). 0 = no check. Example: 8388608 (8MB).
# olo.config.snapshot.max.redis.value.bytes=8388608
# Snapshot validation: when true, worker verifies metadata checksum against loaded core+pipelines+connections.
# Env override: OLO_CONFIGURATION_CHECKSUM=true/false
olo.configuration.checksum=false

# Bootstrap: wait for Redis + snapshot at startup. 0 = wait forever.
olo.bootstrap.config.store.retry.interval.ms=5000
olo.bootstrap.config.wait.timeout.seconds=0

# Redis config (for refresh/store): timeouts and retry avoid indefinite hang on partition/slow/failover.
# olo.redis.config.timeout.ms=5000
# olo.redis.config.maxRetries=3
# olo.redis.config.retryBackoff.ms=500

# Application
olo.app.env=development
olo.app.log.level=INFO
# When true, dump input JSON, global context summary, and OloRuntimeContext to olo.app.dump.dir on every execution.
# Env override: OLO_APP_DUMP=true/false, OLO_APP_DUMP_DIR=<path>
olo.app.dump=true
olo.app.dump.dir=build/debug-dump
