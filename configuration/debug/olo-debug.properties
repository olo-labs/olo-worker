# Optional local overrides for bootstrap debug (key=value).
# Use as reference or copy entries into olo-defaults.properties / ENV.
# Not loaded automatically; set env vars or merge into defaults for use.
# See: docs/architecture/bootstrap/how-to-debug.md

# Region
olo.region=default

# Redis
olo.redis.host=localhost
olo.redis.port=6379
olo.redis.password=
# olo.redis.uri=redis://localhost:6379

# PostgreSQL
olo.db.host=localhost
olo.db.port=5432
olo.db.name=olo
olo.db.username=olo
olo.db.password=pgpass
# olo.db.url=jdbc:postgresql://localhost:5432/olo
olo.db.pool.size=10

# Temporal (optional)
olo.temporal.target=localhost:47233
olo.temporal.namespace=default

# Bootstrap wait (0 = wait forever for Redis/snapshot)
olo.bootstrap.config.store.retry.interval.ms=5000
olo.bootstrap.config.wait.timeout.seconds=0
